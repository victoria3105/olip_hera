name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository terlebih dahulu agar semua file project terunduh
    - uses: actions/checkout@v4

    # 2. Setup PHP (Menggunakan versi v2 terbaru dan PHP 8.2/8.3 yang stabil untuk Laravel saat ini)
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
        coverage: none

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    # 3. Ambil cache dependencies agar proses install lebih cepat
    - name: Get Composer Cache Directory
      id: composer-cache
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
    - uses: actions/cache@v4
      with:
        path: ${{ steps:composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    # 4. Ambil key dari env jika ada, atau generate baru
    - name: Generate key
      run: php artisan key:generate

    # 5. Sesuaikan permission folder agar tidak error saat menulis log/cache
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    # 6. Setup database SQLite untuk testing
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    # 7. Jalankan testing
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test