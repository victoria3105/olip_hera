name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Ambil source code project
    - uses: actions/checkout@v4

    # 2. Setup PHP versi stabil
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
        coverage: none

    # 3. Cari otomatis di mana letak folder Laravel Anda dan jalankan setup env
    - name: Find Project Directory and Copy .env
      run: |
        TARGET_DIR=$(find . -name "composer.json" -not -path "*/vendor/*" -exec dirname {} \;)
        if [ -z "$TARGET_DIR" ]; then
          echo "Error: composer.json tidak ditemukan di mana pun!"
          exit 1
        fi
        echo "Project Laravel ditemukan di folder: $TARGET_DIR"
        echo "PROJECT_PATH=$TARGET_DIR" >> $GITHUB_ENV
        
        cd "$TARGET_DIR"
        php -r "file_exists('.env') || copy('.env.example', '.env');"

    # 4. Install Dependencies menggunakan path otomatis yang ditemukan di atas
    - name: Install Dependencies
      uses: ramsey/composer-install@v3
      with:
        working-directory: ${{ env.PROJECT_PATH }}
        composer-options: "--prefer-dist --no-scripts"

    # 5. Generate Application Key
    - name: Generate key
      run: |
        cd ${{ env.PROJECT_PATH }}
        php artisan key:generate

    # 6. Set Permission Folder
    - name: Directory Permissions
      run: |
        cd ${{ env.PROJECT_PATH }}
        chmod -R 777 storage bootstrap/cache

    # 7. Siapkan Database SQLite untuk testing
    - name: Create Database
      run: |
        cd ${{ env.PROJECT_PATH }}
        mkdir -p database
        touch database/database.sqlite

    # 8. Jalankan Unit & Feature Test
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        cd ${{ env.PROJECT_PATH }}
        php artisan test