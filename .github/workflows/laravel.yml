name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    steps:
    # 1. Ambil source code project
    - uses: actions/checkout@v4

    # 2. Setup PHP versi stabil untuk Laravel
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
        coverage: none

    # 3. Copy environment file
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    # 4. Install Dependencies dengan cerdas (Otomatis handle cache & ekstensi)
    - name: Install Dependencies
      uses: ramsey/composer-install@v3
      with:
        composer-options: "--prefer-dist --no-scripts"

    # 5. Generate Application Key
    - name: Generate key
      run: php artisan key:generate

    # 6. Set Permission Folder agar tidak error permission denied
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    # 7. Siapkan Database SQLite untuk testing
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    # 8. Jalankan Unit & Feature Test
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test